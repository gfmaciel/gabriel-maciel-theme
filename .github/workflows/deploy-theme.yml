name: Deploy Theme to Ghost

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Zip theme
        run: zip -r theme.zip . -x "*.git*" "*.zip" "node_modules/*"

      - name: Upload to Ghost
        env:
          GHOST_URL: ${{ secrets.GHOST_ADMIN_API_URL }}
          GHOST_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}
          # set this to your Ghost API version, e.g. v6.0
          GHOST_ACCEPT_VERSION: v6.0
        run: |
          set -o pipefail

          TOKEN=$(node -e "
            const crypto = require('crypto');
            const [id, secret] = process.env.GHOST_KEY.split(':');
            const now = Math.floor(Date.now() / 1000);
            const h = Buffer.from(JSON.stringify({alg:'HS256',kid:id,typ:'JWT'})).toString('base64url');
            const p = Buffer.from(JSON.stringify({iat:now,exp:now+300,aud:'/admin/'})).toString('base64url');
            const s = crypto.createHmac('sha256', Buffer.from(secret, 'hex')).update(h + '.' + p).digest('base64url');
            console.log(h + '.' + p + '.' + s);
          ")

          ENDPOINT="${GHOST_URL%/}/ghost/api/admin/themes/upload"
          echo "Endpoint: $ENDPOINT"

          STATUS=$(curl -sS \
            -D headers.txt \
            -o body.txt \
            -w "%{http_code}" \
            -H "Authorization: Ghost $TOKEN" \
            -H "Accept-Version: $GHOST_ACCEPT_VERSION" \
            -F "file=@theme.zip;type=application/zip" \
            "$ENDPOINT" || true)

          echo "HTTP status: $STATUS"
          echo "--- headers ---"
          sed -n '1,80p' headers.txt
          echo "--- body ---"
          sed -n '1,120p' body.txt

          test "$STATUS" -ge 200 -a "$STATUS" -lt 300

      - name: Activate theme
        env:
          GHOST_URL: ${{ secrets.GHOST_ADMIN_API_URL }}
          GHOST_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}
          GHOST_ACCEPT_VERSION: v6.0
        run: |
          set -o pipefail

          TOKEN=$(node -e "
            const crypto = require('crypto');
            const [id, secret] = process.env.GHOST_KEY.split(':');
            const now = Math.floor(Date.now() / 1000);
            const h = Buffer.from(JSON.stringify({alg:'HS256',kid:id,typ:'JWT'})).toString('base64url');
            const p = Buffer.from(JSON.stringify({iat:now,exp:now+300,aud:'/admin/'})).toString('base64url');
            const s = crypto.createHmac('sha256', Buffer.from(secret, 'hex')).update(h + '.' + p).digest('base64url');
            console.log(h + '.' + p + '.' + s);
          ")

          # Read the theme name from the upload response (body.txt written by previous step)
          THEME_NAME=$(node -e "
            const d = require('fs').readFileSync('body.txt', 'utf8');
            const themes = JSON.parse(d).themes;
            if (themes && themes[0] && themes[0].name) { console.log(themes[0].name); }
            else { process.exit(1); }
          ")
          echo "Activating theme: $THEME_NAME"

          ACTIVATE_STATUS=$(curl -sS \
            -o activate_body.txt \
            -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Ghost $TOKEN" \
            -H "Accept-Version: $GHOST_ACCEPT_VERSION" \
            "${GHOST_URL%/}/ghost/api/admin/themes/${THEME_NAME}/activate")

          echo "Activate HTTP status: $ACTIVATE_STATUS"
          cat activate_body.txt

          test "$ACTIVATE_STATUS" -ge 200 -a "$ACTIVATE_STATUS" -lt 300
